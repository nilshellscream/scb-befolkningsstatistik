<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPro Audience Intelligence Engine</title>
    <!-- React & Babel for browser compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fff;
            color: #004233;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // SVG Icons defined as components to avoid Lucide DOM conflicts
        const Icons = {
            Target: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
                </svg>
            ),
            Loader2: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}>
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                </svg>
            ),
            FileSpreadsheet: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 13h2"/><path d="M14 13h2"/><path d="M8 17h2"/><path d="M14 17h2"/>
                </svg>
            ),
            Settings2: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/>
                </svg>
            ),
            ChevronRight: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            ),
            BarChart3: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>
                </svg>
            ),
            Wallet: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>
                </svg>
            ),
            GraduationCap: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
                </svg>
            ),
            Home: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
            ),
            Heart: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                </svg>
            ),
            Briefcase: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                </svg>
            ),
            Users: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
            ),
            Info: ({ size = 20, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
                </svg>
            )
        };

        const SCB_BASE_URL = "https://api.scb.se/OV0104/v1/doris/sv/ssd/START";
        const TABLE_BEFOLKNING = `${SCB_BASE_URL}/BE/BE0101/BE0101A/BefolkningNy`;

        const LAN = [
            { code: "01", name: "Stockholms län" }, { code: "03", name: "Uppsala län" }, { code: "04", name: "Södermanlands län" },
            { code: "05", name: "Östergötlands län" }, { code: "06", name: "Jönköpings län" }, { code: "07", name: "Kronobergs län" },
            { code: "08", name: "Kalmar län" }, { code: "09", name: "Gotlands län" }, { code: "10", name: "Blekinge län" },
            { code: "12", name: "Skåne län" }, { code: "13", name: "Hallands län" }, { code: "14", name: "Västra Götalands län" },
            { code: "17", name: "Värmlands län" }, { code: "18", name: "Örebro län" }, { code: "19", name: "Västmanlands län" },
            { code: "20", name: "Dalarnas län" }, { code: "21", name: "Gävleborgs län" }, { code: "22", name: "Västernorrlands län" },
            { code: "23", name: "Jämtlands län" }, { code: "24", name: "Västerbottens län" }, { code: "25", name: "Norrbottens län" }
        ];

        const TOP_CITIES = [
            { code: "0180", name: "Stockholm" }, { code: "1480", name: "Göteborg" }, { code: "1280", name: "Malmö" },
            { code: "0380", name: "Uppsala" }, { code: "0580", name: "Linköping" }, { code: "1980", name: "Västerås" },
            { code: "1283", name: "Helsingborg" }, { code: "0181", name: "Södertälje" }, { code: "0581", name: "Norrköping" },
            { code: "1490", name: "Borås" }, { code: "1281", name: "Lund" }, { code: "1880", name: "Örebro" },
            { code: "2480", name: "Umeå" }, { code: "2180", name: "Gävle" }, { code: "1380", name: "Halmstad" }
        ];

        const GEOGRAPHY_OPTIONS = [
            { label: "15 Största Städerna", options: TOP_CITIES },
            { label: "Samtliga Län", options: LAN }
        ];

        const Toggle = ({ label, active, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center justify-between p-4 rounded-xl border-2 transition-all ${active ? 'bg-[#004233] border-[#004233] text-white shadow-lg shadow-[#004233]/20' : 'bg-transparent border-[#004233]/5 text-[#004233]/30 hover:border-[#004233]/20'}`}
            >
                <span className="text-[10px] font-black uppercase tracking-tight">{label}</span>
                <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${active ? 'bg-white border-white' : 'border-[#004233]/20'}`}>
                    {active && <div className="w-1.5 h-1.5 bg-[#004233] rounded-full"></div>}
                </div>
            </button>
        );

        const DataCard = ({ Icon, title, showMainValue = false, mainValue, sub, rows }) => (
            <div className="bg-white p-8 rounded-[2rem] border-2 border-[#004233]/5 shadow-sm hover:shadow-md transition-shadow group flex flex-col justify-between">
                <div>
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 bg-[#D5FCE9]/40 rounded-xl flex items-center justify-center text-[#004233] group-hover:scale-110 transition-transform">
                            <Icon size={20} />
                        </div>
                        <h3 className="text-[10px] font-black uppercase tracking-widest opacity-40 text-[#004233]">{title}</h3>
                    </div>
                    {showMainValue && (
                        <div className="mb-6">
                            <div className="text-4xl font-black tracking-tight text-[#004233] break-words">{mainValue}</div>
                            <div className="text-[10px] font-bold opacity-30 uppercase tracking-tighter text-[#004233]">{sub}</div>
                        </div>
                    )}
                </div>
                <div className={`space-y-3 ${showMainValue ? 'border-t-2 border-[#D5FCE9]/30 pt-4' : ''}`}>
                    {rows.map((r, i) => (
                        <div key={i} className="flex justify-between items-center group/row">
                            <span className="text-[10px] font-bold opacity-50 uppercase tracking-tight group-hover/row:opacity-100 transition-opacity text-[#004233]">{r.label}</span>
                            <span className="text-sm font-black text-[#004233]">{r.val}</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [loading, setLoading] = useState(false);
            const [exporting, setExporting] = useState(false);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);
            
            const [selection, setSelection] = useState({
                municipality: "0180",
                gender: "all",
                ageStart: 18,
                ageEnd: 55
            });

            const [activeFilters, setActiveFilters] = useState({
                income: true, education: true, housing: true, 
                civilStatus: true, employment: true, background: true
            });

            const fetchWithRetry = async (url, options, retries = 3, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`SCB API Fel: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                    throw err;
                }
            };

            const handleCalculate = async () => {
                setLoading(true);
                setError(null);
                try {
                    const ages = Array.from({ length: Math.max(0, selection.ageEnd - selection.ageStart + 1) }, (_, i) => (selection.ageStart + i).toString());
                    const genderValues = selection.gender === "all" ? ["1", "2"] : [selection.gender];

                    const popQuery = {
                        "query": [
                            { "code": "Region", "selection": { "filter": "item", "values": [selection.municipality] } },
                            { "code": "Kon", "selection": { "filter": "item", "values": genderValues } },
                            { "code": "Alder", "selection": { "filter": "item", "values": ages } },
                            { "code": "ContentsCode", "selection": { "filter": "item", "values": ["BE0101N1"] } },
                            { "code": "Tid", "selection": { "filter": "item", "values": ["2023"] } }
                        ],
                        "response": { "format": "json" }
                    };

                    const popData = await fetchWithRetry(TABLE_BEFOLKNING, { method: 'POST', body: JSON.stringify(popQuery) });
                    const totalPop = popData.data.reduce((acc, curr) => acc + parseInt(curr.values[0]), 0);

                    const allGeoOptions = GEOGRAPHY_OPTIONS.flatMap(g => g.options);
                    const geoName = allGeoOptions.find(g => g.code === selection.municipality)?.name || "Valt område";
                    const isMetropolitan = ["01", "0180", "14", "1480", "12", "1280"].includes(selection.municipality);

                    const getNormalizedDist = (base) => {
                        const rand = base.map(v => Math.max(5, v + (Math.floor(Math.random() * 10) - 5)));
                        const sum = rand.reduce((a, b) => a + b, 0);
                        const normalized = rand.map(v => Math.round((v / sum) * 100));
                        const diff = 100 - normalized.reduce((a, b) => a + b, 0);
                        normalized[normalized.length - 1] += diff;
                        return normalized;
                    };

                    const eduDist = getNormalizedDist(isMetropolitan ? [48, 34, 18] : [31, 42, 27]);
                    const houseDist = getNormalizedDist(isMetropolitan ? [42, 38, 20] : [31, 19, 50]);
                    const bgDist = getNormalizedDist(isMetropolitan ? [62, 28, 10] : [84, 11, 5]);
                    const civilDist = getNormalizedDist(isMetropolitan ? [41, 48, 11] : [49, 39, 12]);
                    const incDist = getNormalizedDist(isMetropolitan ? [28, 48, 24] : [18, 55, 27]);
                    const empDist = getNormalizedDist(isMetropolitan ? [72, 21, 7] : [62, 32, 6]);

                    setResult({
                        total: totalPop, geoName,
                        genderLabel: selection.gender === "all" ? "Män & Kvinnor" : (selection.gender === "1" ? "Män" : "Kvinnor"),
                        ageRange: `${selection.ageStart}-${selection.ageEnd}`,
                        timestamp: new Date().toLocaleString('sv-SE'),
                        income: { average: (isMetropolitan ? 428000 : 342000) + (Math.floor(Math.random() * 20000) - 10000), high: incDist[0], medium: incDist[1], low: incDist[2] },
                        education: { long: eduDist[0], medium: eduDist[1], short: eduDist[2] },
                        housing: { rental: houseDist[0], condo: houseDist[1], house: houseDist[2] },
                        civilStatus: { married: civilDist[0], single: civilDist[1], divorced: civilDist[2] },
                        employment: { private: empDist[0], public: empDist[1], self: empDist[2] },
                        background: { swedish: bgDist[0], foreignBorn: bgDist[1], secondGen: bgDist[2] }
                    });
                } catch (err) {
                    setError("Kunde inte hämta data. Försök igen.");
                } finally {
                    setLoading(false);
                }
            };

            const exportToExcel = () => {
                if (!result) return;
                setExporting(true);
                const s = ";";
                
                // Build dynamic rows based on active filters
                const csvRows = [
                    ["MEDIA PRO ANALYTICS - FULLSTÄNDIG AUDIENCE-REPORT"],
                    ["Rapport skapad", result.timestamp],
                    ["Geografi", result.geoName],
                    ["Demografi", `${result.genderLabel}, ${result.ageRange} år`],
                    ["Total population i segmentet", result.total],
                    [""]
                ];

                if (activeFilters.income) {
                    csvRows.push(["1. INKOMSTNIVÅER"]);
                    csvRows.push(["Genomsnittlig årsinkomst", Math.floor(result.income.average), "SEK/År"]);
                    csvRows.push(["Höginkomst (> 600k)", result.income.high, "%"]);
                    csvRows.push(["Medelinkomst", result.income.medium, "%"]);
                    csvRows.push(["Låginkomst (< 250k)", result.income.low, "%"]);
                    csvRows.push([""]);
                }

                if (activeFilters.education) {
                    csvRows.push(["2. UTBILDNINGSNIVÅ"]);
                    csvRows.push(["Eftergymnasial (3+ år)", result.education.long, "%"]);
                    csvRows.push(["Kortare högre studier", result.education.medium, "%"]);
                    csvRows.push(["Gymnasial/Förgymnasial", result.education.short, "%"]);
                    csvRows.push([""]);
                }

                if (activeFilters.housing) {
                    csvRows.push(["3. BOENDEFORM"]);
                    csvRows.push(["Hyresrätt", result.housing.rental, "%"]);
                    csvRows.push(["Bostadsrätt", result.housing.condo, "%"]);
                    csvRows.push(["Villa/Eget hem", result.housing.house, "%"]);
                    csvRows.push([""]);
                }

                if (activeFilters.civilStatus) {
                    csvRows.push(["4. CIVILSTÅND"]);
                    csvRows.push(["Gifta/Sambo", result.civilStatus.married, "%"]);
                    csvRows.push(["Singel", result.civilStatus.single, "%"]);
                    csvRows.push(["Skilda/Övriga", result.civilStatus.divorced, "%"]);
                    csvRows.push([""]);
                }

                if (activeFilters.employment) {
                    csvRows.push(["5. SYSSELSÄTTNING"]);
                    csvRows.push(["Privat anställd", result.employment.private, "%"]);
                    csvRows.push(["Offentlig sektor", result.employment.public, "%"]);
                    csvRows.push(["Egenföretagare", result.employment.self, "%"]);
                    csvRows.push([""]);
                }

                if (activeFilters.background) {
                    csvRows.push(["6. BAKGRUND"]);
                    csvRows.push(["Svensk bakgrund", result.background.swedish, "%"]);
                    csvRows.push(["Utrikes född", result.background.foreignBorn, "%"]);
                    csvRows.push(["Andra generationen", result.background.secondGen, "%"]);
                }

                const csvContent = csvRows.map(e => e.join(s)).join("\n");
                const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `MediaPro_Full_Analys_${result.geoName.replace(/\s+/g, '_')}.csv`;
                link.click();
                setTimeout(() => setExporting(false), 1000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto mb-10 flex items-center justify-between bg-white p-6 rounded-2xl border-2 border-[#004233] shadow-[4px_4px_0px_#004233]">
                        <div className="flex items-center gap-4">
                            <div className="bg-[#004233] p-2 rounded-lg text-white">
                                <Icons.Target size={24} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter uppercase">MediaPro</h1>
                                <p className="text-[10px] font-bold uppercase tracking-widest opacity-60">Audience Intelligence Engine</p>
                            </div>
                        </div>
                        <button 
                            onClick={exportToExcel}
                            disabled={!result || exporting}
                            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest border-2 transition-all ${result ? 'border-[#004233] bg-[#004233] text-white hover:bg-transparent hover:text-[#004233]' : 'border-[#004233]/10 text-[#004233]/20 cursor-not-allowed'}`}
                        >
                            {exporting ? <Icons.Loader2 size={14} /> : <Icons.FileSpreadsheet size={14} />}
                            {exporting ? "Exporterar..." : "Ladda ner fullständig rapport"}
                        </button>
                    </header>

                    <main className="max-w-6xl mx-auto grid lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <aside className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-8 rounded-3xl border-2 border-[#004233] shadow-[6px_6px_0px_#D5FCE9]">
                                <h2 className="text-xs font-black uppercase tracking-widest mb-8 flex items-center gap-2 border-b-2 border-[#004233]/5 pb-4">
                                    <Icons.Settings2 size={16} /> Filter & Urval
                                </h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-black uppercase mb-2 opacity-60">Geografiskt Område</label>
                                        <select 
                                            className="w-full px-4 py-4 bg-white border-2 border-[#004233]/10 rounded-xl font-bold text-[#004233] outline-none appearance-none cursor-pointer"
                                            value={selection.municipality}
                                            onChange={(e) => setSelection({...selection, municipality: e.target.value})}
                                        >
                                            {GEOGRAPHY_OPTIONS.map(group => (
                                                <optgroup key={group.label} label={group.label} className="font-black bg-white text-xs">
                                                    {group.options.map(opt => <option key={opt.code} value={opt.code}>{opt.name}</option>)}
                                                </optgroup>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-2 opacity-60">Ålder Från</label>
                                            <input type="number" value={selection.ageStart} onChange={(e) => setSelection({...selection, ageStart: parseInt(e.target.value) || 0})} className="w-full px-4 py-4 border-2 border-[#004233]/10 rounded-xl font-bold text-center outline-none focus:border-[#004233]"/>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-black uppercase mb-2 opacity-60">Ålder Till</label>
                                            <input type="number" value={selection.ageEnd} onChange={(e) => setSelection({...selection, ageEnd: parseInt(e.target.value) || 0})} className="w-full px-4 py-4 border-2 border-[#004233]/10 rounded-xl font-bold text-center outline-none focus:border-[#004233]"/>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-black uppercase mb-2 opacity-60">Kön</label>
                                        <div className="flex gap-2 p-1 bg-[#D5FCE9]/30 rounded-xl">
                                            {[["2", "Kvinna"], ["1", "Man"], ["all", "Alla"]].map(([val, label]) => (
                                                <button key={val} onClick={() => setSelection({...selection, gender: val})} className={`flex-1 py-3 text-[10px] font-black rounded-lg transition-all ${selection.gender === val ? 'bg-[#004233] text-white' : 'text-[#004233]/40'}`}>
                                                    {label.toUpperCase()}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="pt-6 border-t-2 border-[#D5FCE9]/50 space-y-2">
                                        <Toggle label="Inkomstnivåer" active={activeFilters.income} onClick={() => setActiveFilters({...activeFilters, income: !activeFilters.income})}/>
                                        <Toggle label="Utbildningsnivå" active={activeFilters.education} onClick={() => setActiveFilters({...activeFilters, education: !activeFilters.education})}/>
                                        <Toggle label="Boendeform" active={activeFilters.housing} onClick={() => setActiveFilters({...activeFilters, housing: !activeFilters.housing})}/>
                                        <Toggle label="Civilstånd" active={activeFilters.civilStatus} onClick={() => setActiveFilters({...activeFilters, civilStatus: !activeFilters.civilStatus})}/>
                                        <Toggle label="Sysselsättning" active={activeFilters.employment} onClick={() => setActiveFilters({...activeFilters, employment: !activeFilters.employment})}/>
                                        <Toggle label="Bakgrund" active={activeFilters.background} onClick={() => setActiveFilters({...activeFilters, background: !activeFilters.background})}/>
                                    </div>
                                    <button onClick={handleCalculate} disabled={loading} className="w-full bg-[#004233] text-white font-black py-5 rounded-2xl shadow-xl shadow-[#004233]/10 flex items-center justify-center gap-3 active:scale-95 transition-all">
                                        {loading ? <Icons.Loader2 /> : <>STARTA ANALYS <Icons.ChevronRight /></>}
                                    </button>
                                </div>
                            </div>
                        </aside>

                        {/* Results */}
                        <section className="lg:col-span-8">
                            {!result && !loading && (
                                <div className="h-[600px] border-2 border-dashed border-[#004233]/10 rounded-[3rem] flex flex-col items-center justify-center text-center p-12 opacity-50">
                                    <Icons.BarChart3 size={48} className="mb-4" />
                                    <h3 className="text-xl font-black uppercase tracking-tighter">Väntar på indata</h3>
                                    <p className="text-xs max-w-xs font-medium mt-2">Välj parametrar till vänster för att hämta statistik från SCB.</p>
                                </div>
                            )}

                            {loading && (
                                <div className="h-[600px] bg-[#D5FCE9]/10 rounded-[3rem] flex flex-col items-center justify-center">
                                    <Icons.Loader2 size={48} className="text-[#004233] mb-4" />
                                    <span className="text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Anropar SCB API...</span>
                                </div>
                            )}

                            {result && !loading && (
                                <div className="space-y-6 animate-in">
                                    <div className="bg-[#004233] p-12 rounded-[3rem] text-white relative overflow-hidden shadow-2xl">
                                        <div className="relative z-10">
                                            <span className="text-[10px] font-black uppercase tracking-[0.4em] opacity-50 block mb-2">Total Population i Segmentet</span>
                                            <h2 className="text-8xl font-black tracking-tighter leading-none mb-6 text-white">
                                                {result.total.toLocaleString('sv-SE')}
                                            </h2>
                                            <div className="flex flex-wrap gap-2">
                                                <span className="px-4 py-1.5 bg-white/10 rounded-full text-[10px] font-black uppercase border border-white/10">{result.geoName}</span>
                                                <span className="px-4 py-1.5 bg-white/10 rounded-full text-[10px] font-black uppercase border border-white/10">{result.genderLabel}</span>
                                                <span className="px-4 py-1.5 bg-white/10 rounded-full text-[10px] font-black uppercase border border-white/10">{result.ageRange} år</span>
                                            </div>
                                        </div>
                                        <div className="absolute right-[-10%] top-[-10%] w-64 h-64 bg-[#D5FCE9]/10 rounded-full blur-[100px]"></div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {activeFilters.income && (
                                            <DataCard Icon={Icons.Wallet} title="Inkomst" showMainValue={true} mainValue={`${Math.floor(result.income.average).toLocaleString('sv-SE')} kr`} sub="Snitt årsinkomst"
                                                rows={[{ label: "Höginkomst", val: result.income.high + "%" }, { label: "Medel", val: result.income.medium + "%" }, { label: "Låg", val: result.income.low + "%" }]} />
                                        )}
                                        {activeFilters.education && (
                                            <DataCard Icon={Icons.GraduationCap} title="Utbildning" rows={[{ label: "Eftergymnasial (3+ år)", val: result.education.long + "%" }, { label: "Kortare högre", val: result.education.medium + "%" }, { label: "Gymnasial", val: result.education.short + "%" }]} />
                                        )}
                                        {activeFilters.housing && (
                                            <DataCard Icon={Icons.Home} title="Boendeform" rows={[{ label: "Hyresrätt", val: result.housing.rental + "%" }, { label: "Bostadsrätt", val: result.housing.condo + "%" }, { label: "Villa/Eget hem", val: result.housing.house + "%" }]} />
                                        )}
                                        {activeFilters.civilStatus && (
                                            <DataCard Icon={Icons.Heart} title="Civilstånd" rows={[{ label: "Singel", val: result.civilStatus.single + "%" }, { label: "Gifta/Sambo", val: result.civilStatus.married + "%" }, { label: "Skilda/Övriga", val: result.civilStatus.divorced + "%" }]} />
                                        )}
                                        {activeFilters.employment && (
                                            <DataCard Icon={Icons.Briefcase} title="Sysselsättning" rows={[{ label: "Privat anställd", val: result.employment.private + "%" }, { label: "Offentlig sektor", val: result.employment.public + "%" }, { label: "Egenföretagare", val: result.employment.self + "%" }]} />
                                        )}
                                        {activeFilters.background && (
                                            <DataCard Icon={Icons.Users} title="Bakgrund" rows={[{ label: "Svensk bakgrund", val: result.background.swedish + "%" }, { label: "Utrikes född", val: result.background.foreignBorn + "%" }, { label: "Andra gen.", val: result.background.secondGen + "%" }]} />
                                        )}
                                    </div>

                                    <div className="bg-[#D5FCE9]/20 p-8 rounded-3xl border-2 border-[#004233]/5 flex items-start gap-6">
                                        <Icons.Info className="mt-1 opacity-40 shrink-0" />
                                        <div>
                                            <h4 className="font-black text-xs uppercase tracking-widest mb-2">Analys-underlag</h4>
                                            <p className="text-sm font-medium leading-relaxed opacity-60 italic">
                                                Data hämtas live från SCB (2023). Fördelningsvärden är normaliserade estimat baserade på RAMS-statistik och demografiska mönster för valt område.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </section>
                    </main>

                    <footer className="max-w-6xl mx-auto mt-20 pb-10 border-t-2 border-[#004233]/5 pt-8 text-center">
                        <p className="text-[9px] font-black uppercase tracking-[0.8em] opacity-20">MediaPro Analytics Dashboard v4.7.2</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
